services:
  # PHP-FPM application container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:z
    networks:
      - library_net
    depends_on:
      - db

  # Nginx web server container
  web:
    image: nginx:alpine
    container_name: library_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
    networks:
      - library_net
    depends_on:
      - app

  # MySQL database container
  db:
    image: mysql:8.0
    container_name: library_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: biblioteca
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - library_net

# Networks to enable communication between containers
networks:
  library_net:
    driver: bridge

# Persistent volume for MySQL database
volumes:
  db_data:
    driver: local
